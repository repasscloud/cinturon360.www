# Navigation Menu
[menu]

[[menu.main]]
name = "Platform"
weight = 1
[menu.main.params]
has_submenu = true
submenu = [
  { name = "Policy & Approvals", url = "/platform/policy-approvals/" },
  { name = "Integrations", url = "/platform/integrations/" },
  { name = "Reporting & Visibility", url = "/platform/reporting-visibility/" },
  { name = "TMC Operations", url = "/platform/tmc-operations/" },
  { name = "Performance & Scale", url = "/platform/performance-scale/" },
]

[[menu.main]]
name = "API"
url = "/api/"
weight = 2

[[menu.main]]
name = "About"
url = "/about/"
weight = 3

[[menu.main]]
name = "Contact"
url = "/contact/"
weight = 4

