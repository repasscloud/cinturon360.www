baseURL = "https://cinturon360.com"
title = "Cinturon360"
defaultContentLanguage = "en"

# Theme Config
theme = "hugo-saasify-theme"

# Enable emoji support
enableEmoji = true

# Enable Git info for lastmod
enableGitInfo = true

# Enable taxonomies
[taxonomies]
category = 'categories'
tag = 'tags'

# Pagination
[pagination]
pagerSize = 6
path = "page"

[params]
description = ""
author = "RePass Cloud"
logo = "/images/logo.svg"
# Google Analytics ID (e.g., "G-XXXXXXXXXX")
# googleAnalytics = "G-XXXXXXXXXX"
title2 = "Cinturon360.com"
title2a = "Cinturon"
title2b = "360"

# Global CTA Configuration
[params.cta]
enable = true
title = "<span style='color: var(--c360-primary);'>Cinturon</span><span style='color: var(--c360-accent);'>360</span> is coming soon"
description = "Cinturon360 is an upcoming travel governance and visibility platform designed to work with existing booking channels, apply policy and approvals, and deliver finance-grade reporting. Join the waitlist to follow the launch."
gradient_from = "#38bdf833"
gradient_to = "#0f172a"
gradient_angle = 30

[params.cta.primary_button]
text = "Join Waitlist"
url = "/waitlist"

[params.cta.secondary_button]
text = "See Preview"
url = "/preview"

# Social Media Links
[params.social]
linkedin = "https://linkedin.com/in/repasscloud"
twitter = "https://twitter.com/repasscloud"
# bluesky = "https://bsky.app/profile/repasscloud"
# youtube = "https://youtube.com/@repasscloud"
# facebook = "https://facebook.com/repasscloud"
# instagram = "https://instagram.com/repasscloud"
github = "https://github.com/repasscloud"
# telegram = "https://t.me/yourchannel"
# discord = "https://discord.gg/yourinvite"
# slack = "https://yourteam.slack.com"
# medium = "https://medium.com/@yourhandle"
# dribbble = "https://dribbble.com/yourprofile"
# behance = "https://behance.net/yourprofile"

# Footer Configuration
[params.footer]
column_1_title = "PLATFORM"
column_2_title = "COMPANY"
column_3_title = "LEGAL"

[params.header]
# Header background and border styles (optional)
background = "bg-white/80 backdrop-blur-sm"
border = "border-b border-gray-100"

# Logo configuration
[params.header.logo]
src = "/images/logo.svg"

# Menu configuration
[params.header.menu]
spacing = "space-x-8"

# Dropdown menu configuration
[params.header.menu.dropdown]
width = "w-72"
container_padding = "py-6"
item_padding = "px-8 py-3"
background = "bg-white"
border = "border border-gray-100"
shadow = "shadow-xl"
radius = "rounded-lg"
text_color = "text-gray-700"
hover_background = "hover:bg-gray-50"
text_size = "text-sm"

# Button configuration
[params.header.buttons]
# Sign In button
[params.header.buttons.signIn]
text = "Sign in"
url = "/signin"

# Get Started button
[params.header.buttons.getStarted]
text = "Reach Out"
url = "/contact"

# Blog configuration
[params.blog]
enable = true
title = "Latest Articles"
subtitle = "Learn more about web development and best practices"

# Blog CTA configuration
[params.blog.cta]
enable = false # Enable/disable CTA in blog posts

# Sidebar configuration
[params.blog.sidebar]
# Recent articles section
[params.blog.sidebar.recent]
enable = true
title = "Recent Articles"
count = 5

# Categories section
[params.blog.sidebar.categories]
enable = true
title = "Categories"

# Tags section
[params.blog.sidebar.tags]
enable = true
title = "Popular Tags"
count = 20

# Subscribe form section
[params.blog.sidebar.subscribe]
enable = true
title = "Subscribe to Newsletter"
description = "Get the latest posts delivered right to your inbox"
action = "https://formspree.io/f/xjgawwbg"
emailName = "email"
buttonText = "Subscribe"
placeholder = "Enter your email"
disclaimer = "We respect your privacy. Unsubscribe at any time."

[module]
[module.hugoVersion]
extended = true
min = "0.80.0"

[build]
writeStats = true

[build.buildStats]
enable = true

[security.funcs]
getenv = ['^HUGO_', '^CI$']

[markup]
[markup.highlight]
noClasses = false
lineNos = true
codeFences = true
guessSyntax = true
lineNumbersInTable = true
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
endLevel = 3
ordered = false
startLevel = 2

# Multilingual Configuration
# Uncomment the sections below to enable multilingual support
# See docs/CONFIGURATION.md for detailed instructions

