<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTA Section Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-100: #e0f2fe;
      --primary-600: #0284c7;
      --primary-700: #0369a1;
      --gradient-angle: 30deg;
      --gradient-from: #38bdf833;
      --gradient-to: #0f172a;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .cta-section {
      padding: 5rem 0;
    }

    .cta-gradient {
      background:
        linear-gradient(var(--gradient-angle), var(--gradient-from), transparent 35%),
        linear-gradient(135deg, var(--primary-600), var(--gradient-to));
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.22);
    }

    .cta-card {
      max-width: 48rem;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .cta-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.5rem;
      line-height: 1.15;
    }

    .cta-text {
      font-size: 1.25rem;
      color: var(--primary-100);
      margin-bottom: 2rem;
    }

    .btn-cta-primary {
      background: #fff;
      color: var(--primary-600);
      border: 0;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
    }

    .btn-cta-primary:hover {
      background: #f1f5f9;
      color: var(--primary-700);
    }

    .btn-cta-secondary {
      border: 2px solid #fff;
      color: #fff;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
    }

    .btn-cta-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <section class="cta-section">
      <div class="container">
        <div class="rounded-4 overflow-hidden cta-gradient"
             style="--gradient-angle: 30deg; --gradient-from: #38bdf833; --gradient-to: #0f172a;">
          <div class="cta-card text-center px-4 px-md-5 py-5">
            <h2 class="cta-title">Ready to Build Your SaaS Website?</h2>
            <p class="cta-text">Join companies already using our theme to create beautiful, high-performance websites.</p>
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
              <a href="/get-started" class="btn btn-cta-primary">Get Started Free</a>
              <a href="/demo" class="btn btn-cta-secondary">Book Demo</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
